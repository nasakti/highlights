<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nasakti&#x2019;s Reading Highlights</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lora:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
</head>
<body>

<!-- Hero header -->
<header class="hero">
  <h1 class="hero-title">Nasakti&rsquo;s Highlights</h1>
  <p class="hero-sub">Reading Collection</p>
  <div class="hero-stats" id="hero-stats">
    <span id="stat-books"><span class="n">&hellip;</span> books</span>
    <span class="sep">&middot;</span>
    <span id="stat-highlights"><span class="n">&hellip;</span> highlights</span>
    <span class="sep">&middot;</span>
    <span id="stat-notes"><span class="n">&hellip;</span> notes</span>
  </div>
</header>

<!-- Search bar -->
<div class="search-bar">
  <div class="search-inner">
    <button class="mob-menu-btn" id="mob-menu-btn" aria-label="Open book list">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="search-wrap">
      <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="search" placeholder="Search across all highlights&hellip;" autocomplete="off">
    </div>
    <div class="view-toggle">
      <button class="view-btn active" data-view="list" title="List view">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="3" y1="6"  x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <button class="view-btn" data-view="gallery" title="Gallery view">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <rect x="3"  y="3"  width="7" height="7" rx="1"/>
          <rect x="14" y="3"  width="7" height="7" rx="1"/>
          <rect x="3"  y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </button>
    </div>
    <button class="theme-btn" id="theme-btn" title="Toggle dark mode">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</div>

<!-- Mobile sidebar overlay -->
<div class="mob-overlay" id="mob-overlay"></div>

<!-- Layout -->
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="filter-label">Source</div>
      <div class="filter-row">
        <button class="filter-btn active" data-source="all">All</button>
        <button class="filter-btn" data-source="Kindle">Kindle</button>
        <button class="filter-btn" data-source="Books">Apple&nbsp;Books</button>
      </div>
    </div>
    <div class="book-list" id="book-list"></div>
  </aside>

  <!-- Main -->
  <main class="main" id="main"></main>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
